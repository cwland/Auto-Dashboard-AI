<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plex Widget — Sample Dashboard</title>
<link rel="stylesheet" href="../styles/common.css">
<link rel="stylesheet" href="plex-widget.css">
<style>
  body { margin: 0; background: var(--bg-primary); padding: 28px; }
  .wrap { max-width: 760px; margin: 0 auto; }
  h1 { font: 700 20px/1.3 system-ui, sans-serif; color: var(--text-primary); margin: 0 0 4px; }
  .lede { font: 400 13px/1.6 system-ui, sans-serif; color: var(--text-muted); margin: 0 0 22px; }
  .tile-host { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
  .row-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>🎬 Plex Widget — Sample Dashboard</h1>
    <p class="lede">
      Offline preview. The demo builds raw Plex <code>/status/sessions</code> attribute objects and runs them
      through the <em>same</em> <code>PlexApi.mapSessions()</code> the live widget uses (episode → season·episode,
      track → album, movie, live TV). Use the buttons to change what's "playing".
    </p>
    <div class="tile-host"><div id="host"></div></div>
    <div class="row-btns">
      <button class="btn btn-secondary btn-sm" id="btn-mixed">Mixed streams</button>
      <button class="btn btn-secondary btn-sm" id="btn-one">Single movie</button>
      <button class="btn btn-secondary btn-sm" id="btn-empty">Nothing playing</button>
    </div>
  </div>

<script src="plex-widget.js"></script>
<script>
  'use strict';
  const mixed = [
    { type: 'episode', grandparentTitle: 'Severance', parentTitle: 'Season 2', title: 'Cold Harbor', index: '4',
      user: { id: '1', title: 'cory', thumb: '' }, player: { product: 'Plex Web', title: 'Chrome' }, session: { id: 's1' } },
    { type: 'movie', title: 'Dune: Part Two',
      user: { id: '2', title: 'jordan', thumb: '' }, player: { product: 'Plex for Apple TV', title: 'Living Room' }, session: { id: 's2' } },
    { type: 'track', grandparentTitle: 'Daft Punk', parentTitle: 'Discovery', title: 'Digital Love',
      user: { id: '3', title: 'sam', thumb: '' }, player: { product: 'Plexamp', title: 'iPhone' }, session: { id: 's3' } },
  ];
  const one = [mixed[1]];

  let mode = 'mixed';
  const data = () => mode === 'empty' ? [] : (mode === 'one' ? one : mixed);

  const widget = new PlexWidget(document.getElementById('host'), {
    dataProvider: () => Promise.resolve(PlexApi.mapSessions(data())),
  });
  widget.start();

  document.getElementById('btn-mixed').addEventListener('click', () => { mode = 'mixed'; widget.poll(); });
  document.getElementById('btn-one').addEventListener('click', () => { mode = 'one'; widget.poll(); });
  document.getElementById('btn-empty').addEventListener('click', () => { mode = 'empty'; widget.poll(); });
</script>
</body>
</html>
